<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>個股詳情 | Hermes</title>
<style>
:root{--bg:#0c0f14;--panel:#141820;--panel2:#1a1f2b;--text:#d8dee8;--muted:#7a8599;--accent:#4aa3ff;--green:#3ecf8e;--red:#f0465a;--orange:#f09030;--border:#252a36}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans TC",sans-serif;line-height:1.55;padding:16px}
a{color:var(--accent)}.card{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin:10px 0}.back{display:inline-block;margin-bottom:12px}
.kv{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:8px}@media(max-width:700px){.kv{grid-template-columns:1fr}}.kv div{background:var(--panel2);border:1px solid var(--border);border-radius:8px;padding:10px 12px}.kv b{display:block;color:var(--muted);font-size:11px;font-weight:500}.kv span{font-size:15px;font-weight:600;display:block;margin-top:2px}
.tier-tag{display:inline-block;font-size:11px;padding:3px 7px;border-radius:999px;font-weight:600}.tier-t1{background:#16302a;color:var(--green)}.tier-t2{background:#1a2430;color:var(--accent)}.tier-t3{background:#2f2316;color:var(--orange)}.tier-t4{background:#221a1a;color:var(--muted)}
.pill{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:999px;font-size:12px;font-weight:600}.pill.ok{background:#16302a;color:var(--green)}.pill.warn{background:#2f2316;color:var(--orange)}.pill.bad{background:#2a1520;color:var(--red)}
.concept{display:inline-block;font-size:12px;padding:3px 8px;border-radius:999px;background:#1a2030;color:#c9ddf0;margin:2px 4px 2px 0}
.alert{padding:10px 12px;border-radius:8px;background:#1e1a22;border:1px solid #342840;color:#e3cbff;font-size:12px;margin-top:10px}
.up{color:var(--green)}.down{color:var(--red)}.float{color:var(--muted)}
</style>
</head>
<body>
<a class="back" href="index.html">← 返回大廳</a>
<h1 id="title" style="font-size:22px;margin:0 0 4px">--</h1>
<div id="badge" class="tier-tag tier-t4" style="margin-bottom:10px">--</div>

<div class="kv" id="kv"></div>

<div class="card">
  <h2 style="margin:0 0 8px;font-size:15px;color:var(--muted)">近期趨勢</h2>
  <div id="trend" style="font-size:14px">--</div>
</div>

<div class="card">
  <h2 style="margin:0 0 8px;font-size:15px;color:var(--muted)">概念股</h2>
  <div id="concepts"></div>
</div>

<div class="card">
  <h2 style="margin:0 0 8px;font-size:15px;color:var(--muted)">同産業 / 概念股可對照</h2>
  <div id="peers"></div>
</div>

<div class="card">
  <h2 style="margin:0 0 8px;font-size:15px;color:var(--muted)">交易劇本（HOLD）</h2>
  <div id="hold" style="font-size:14px">--</div>
</div>

<div class="alert">資料來源：TWSE API · 本頁為靜態 JSON 渲染 · 回報段不保證法人/營收/52週即時</div>

<script>
const qs = new URLSearchParams(location.search);
const id = qs.get('id');
if(!id){ document.body.insertAdjacentHTML('afterbegin','<div class="alert" style="border-color:#f0465a;color:#fbb">缺少 id 參數</div>'); }
const pctClass=(p)=>{ if(p>0) return 'up'; if(p<0) return 'down'; return 'float'; };
fetch('../data.json').then(r=>r.json()).then(d=>{
  const s=(d.stocks||[]).find(x=>x.code===id); if(!s) return;
  document.getElementById('title').textContent = s.name + ' ' + s.code;
  const badge = document.getElementById('badge');
  badge.className = 'tier-tag ' + (s.tier_cls||('tier-'+((s.tier||'T4').toLowerCase())));
  badge.textContent = (s.tier||'T4') + ' ' + (s.tier_label||'');
  document.getElementById('kv').innerHTML = [
    ['收盤價', `${s.price} <span class="${pctClass(s.pct)}">${s.pct>0?'+':''}${s.pct}%</span>`],
    ['成交張數', (s.vol||0).toLocaleString()],
    ['量化評分', s.score!=null ? s.score : '--'],
    ['大單代理', (s.bigOrder||0).toFixed(2)],
    ['漲停基因', s.limitGene ? '有' : '無'],
    ['產業', s.industry||'--'],
    ['持有邏輯', s.hold||'--'],
    ['備註', s.note||'--']
  ].map(([k,v])=>`<div><b>${k}</b><span>${v}</span></div>`).join('');
  document.getElementById('trend').innerHTML = `1日 ${s.day_pct!=null?(s.day_pct>0?'+':'')+s.day_pct+'%':'--'} · 1週 ${s.week_pct!=null?(s.week_pct>0?'+':'')+s.week_pct+'%':'--'} · 1月 ${s.month_pct!=null?(s.month_pct>0?'+':'')+s.month_pct+'%':'--'}`;
  const concepts = (window.__concepts||{})[id] || s.concepts || [];
  document.getElementById('concepts').innerHTML = concepts.map(c=>'<span class="concept">'+c+'</span>').join('') || '<span style="color:var(--muted)">無</span>';
  const peers = (window.__peers||{})[id] || [];
  fetch('../data/etf.json').then(r=>r.json()).then(etf=>{
    const list = peers.slice(0,20).map(c=>{ const st=(d.stocks||[]).find(x=>x.code===c); return st?`<a href="?id=${st.code}" style="display:inline-block;margin:4px 6px 4px 0;padding:6px 8px;background:var(--panel2);border:1px solid var(--border);border-radius:8px;color:var(--text);text-decoration:none;font-size:13px">${st.name} <span style="color:var(--muted)">${st.code}</span></a>`:''; }).join('');
    document.getElementById('peers').innerHTML = list || '<span style="color:var(--muted)">無</span>';
  });
  document.getElementById('hold').innerHTML = `持有價 ${s.hold||'--'}<br>分批價 / 目標價 / 防守點 / 賣出條件請參考研究報告。`;
}).catch(e=>{ document.body.insertAdjacentHTML('afterbegin','<div class="alert" style="border-color:#f0465a;color:#fbb">讀取失敗：'+e.message+'</div>'); });
</script>
</body>
</html>
