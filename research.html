<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>個股深度研究</title>
<style>
  :root {
    --bg: #0b0e14;
    --panel: #111826;
    --line: #1f2633;
    --text: #e6eaf2;
    --muted: #8a93a6;
    --accent: #5aa9ff;
    --good: #34d399;
    --warn: #fbbf24;
    --bad: #f87171;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; font-family: -apple-system, "Noto Sans TC", "PingFang TC", system-ui, sans-serif;
    background: var(--bg); color: var(--text);
  }
  .topbar {
    position: sticky; top: 0; z-index: 10;
    background: rgba(17,24,38,0.85); backdrop-filter: blur(8px);
    border-bottom: 1px solid var(--line);
    padding: 14px 18px; display: flex; gap: 10px; align-items: center;
  }
  .topbar h1 { font-size: 16px; margin: 0; margin-right: auto; }
  .topbar input {
    width: 260px; background: #0d111a; color: var(--text);
    border: 1px solid var(--line); border-radius: 10px;
    padding: 10px 12px; font-size: 14px; outline: none;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 14px; padding: 16px;
  }
  .card {
    background: var(--panel); border: 1px solid var(--line);
    border-radius: 14px; padding: 16px; cursor: pointer;
    transition: transform .1s, border-color .1s;
  }
  .card:hover { transform: translateY(-2px); border-color: #2e3a4f; }
  .card h2 { font-size: 15px; margin: 0 0 6px; color: var(--accent); }
  .card .meta { font-size: 12px; color: var(--muted); margin-bottom: 8px; }
  .card p { font-size: 13px; color: #c7cdd9; line-height: 1.55; margin: 0; }
  .empty { color: var(--muted); padding: 30px; text-align: center; }
  .markdown-body { line-height: 1.7; }
  .markdown-body h1 { font-size: 18px; }
  .markdown-body h2 { font-size: 16px; margin-top: 18px; color: var(--accent); }
  .markdown-body table { border-collapse: collapse; width: 100%; margin: 10px 0; }
  .markdown-body th, .markdown-body td {
    border: 1px solid var(--line); padding: 6px 10px; text-align: left; font-size: 13px;
  }
  .markdown-body th { background: #0d111a; }
  .back {
    display: inline-block; margin: 12px 16px; color: var(--accent);
    text-decoration: none; font-size: 14px;
  }
</style>
</head>
<body>
<div class="topbar">
  <h1>📑 個股深度研究</h1>
  <input id="q" placeholder="搜尋代號 / 名稱 / 關鍵字..." />
</div>
<div id="grid" class="grid"></div>
<div id="detail" style="display:none">
  <a class="back" href="javascript:void(0)" onclick="back()">← 返回列表</a>
  <div class="grid" style="padding-top:6px">
    <div class="card" style="cursor:default">
      <div id="md"></div>
    </div>
  </div>
</div>
<script>
(async () => {
  const BASE = '/home/ubuntu/investment/research';
  const listUrl = BASE + '?format=json';
  let files = [];
  try {
    const res = await fetch(listUrl);
    const txt = await res.text();
    // fallback: 用已知檔名
    files = ['1101_台泥.md','1216_統一.md','1301_台塑.md','1303_台塑化.md','2002_中鋼.md','2303_聯電.md','2308_台達電.md','2313_華通.md','2317_鴻海.md','2327_國巨.md','2330_台積電.md','2344_華邦電.md','2345_鴻準.md','2375_凱美.md','2382_廣達.md','2383_台光電.md','2395_研華.md','2404_漢唐.md','2408_南亞科.md','2412_中華電.md','2454_聯發科.md','2609_陽明.md','2610_華航.md','2615_萬海.md','2618_長榮航.md','2881_國泰金.md','2882_開發金.md','2884_玉山金.md','2886_兆豐金.md','2890_永豐金.md','2892_第一金.md','3005_神基.md','3008_大立光.md'];
  } catch (e) { files = []; }

  const q = document.getElementById('q');
  const grid = document.getElementById('grid');
  const detail = document.getElementById('detail');
  const md = document.getElementById('md');

  function render(list) {
    grid.innerHTML = '';
    if (!list.length) { grid.innerHTML = '<div class="empty">沒有符合的研究報告</div>'; return; }
    list.forEach(f => {
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `<h2>${f.replace('.md','')}</h2><div class="meta">research/${f}</div>`;
      card.onclick = () => openMarkdown(BASE + '/' + f);
      grid.appendChild(card);
    });
  }

  async function openMarkdown(url) {
    grid.style.display = 'none';
    detail.style.display = 'block';
    md.innerHTML = '載入中...';
    try {
      const res = await fetch(url);
      const text = await res.text();
      md.innerHTML = '<div class="markdown-body">' + marked.parse(text) + '</div>';
    } catch (e) {
      md.innerHTML = '<div class="empty">載入失敗</div>';
    }
  }
  window.back = () => { detail.style.display = 'none'; grid.style.display = ''; };

  q.addEventListener('input', () => {
    const v = q.value.trim().toLowerCase();
    const filtered = files.filter(f => f.toLowerCase().includes(v) || f.replace('.md','').includes(v));
    render(filtered);
    back();
  });

  render(files);
})();
</script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</body>
</html>
